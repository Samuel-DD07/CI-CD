name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  # We will set IMAGE_NAME in a setup step to ensure it's lowercase
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- PREPARE ---
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set-image-name.outputs.image_name }}
    steps:
      - id: set-image-name
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

  # --- LINT & TEST STAGE ---
  lint-test-backend:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd backend
          pip install .[dev]
      - name: Lint with Ruff
        run: |
          cd backend
          ruff check .
      - name: Security scan with Bandit
        run: |
          cd backend
          bandit -r . -x ./tests -s B101
      - name: Run tests with coverage
        run: |
          cd backend
          pytest
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  lint-test-frontend:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint
      - name: Run tests with coverage
        run: |
          cd frontend
          npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # --- BUILD STAGE ---
  build-push:
    needs: [setup, lint-test-backend, lint-test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    env:
      IMAGE_NAME: ${{ needs.setup.outputs.image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- SCAN STAGE (Main & Tags) ---
  vulnerability-scan:
    needs: [setup, build-push]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    env:
      IMAGE_NAME: ${{ needs.setup.outputs.image_name }}
    steps:
      - name: Extract metadata for short SHA
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component }}
          tags: |
            type=sha,prefix=sha-

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component }}:${{ steps.meta.outputs.version }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # --- INTEGRATION TESTS (Main) ---
  integration-tests:
    needs: [setup, build-push]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ needs.setup.outputs.image_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and run stack
        run: |
          cd deploy
          export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:main
          export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:main
          docker compose up -d
      - name: Wait for services
        run: sleep 60
      - name: Integration tests check
        run: |
          curl -f http://localhost:8000/docs || exit 1
      - name: Tear down
        run: cd deploy && docker compose down

  # --- DEPLOY REVIEW APP (PR) ---
  deploy-review:
    needs: [setup, build-push]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: review-PR-${{ github.event.number }}
      url: https://review-${{ github.event.number }}.myapp.com
    steps:
      - uses: actions/checkout@v4
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
      - name: Install Helm
        uses: azure/setup-helm@v3
      - name: Deploy Review App
        run: |
          helm upgrade --install review-${{ github.event.number }} ./deploy/helm \
            --set backend.image.tag=pr-${{ github.event.number }} \
            --set frontend.image.tag=pr-${{ github.event.number }} \
            --set ingress.host=review-${{ github.event.number }}.myapp.com

  # --- DEPLOY STAGING (Main) ---
  deploy-staging:
    needs: [setup, integration-tests, vulnerability-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.myapp.com
    steps:
      - uses: actions/checkout@v4
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
      - name: Install Helm
        uses: azure/setup-helm@v3
      - name: Deploy to Staging
        run: |
          helm upgrade --install staging ./deploy/helm \
            --set backend.image.tag=main \
            --set frontend.image.tag=main \
            --set ingress.host=staging.myapp.com
      - name: ZAP DAST Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'https://staging.myapp.com'

  # --- E2E TESTS (Tags) ---
  e2e-tests:
    needs: [setup, vulnerability-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps
      - name: Run E2E Tests
        run: |
          cd frontend
          npm run test:e2e

  # --- DEPLOY PRODUCTION (Tags) ---
  deploy-production:
    needs: [setup, e2e-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://myapp.com
    steps:
      - uses: actions/checkout@v4
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
      - name: Install Helm
        uses: azure/setup-helm@v3
      - name: Deploy to Production
        run: |
          helm upgrade --install production ./deploy/helm \
            --set backend.image.tag=${{ github.ref_name }} \
            --set frontend.image.tag=${{ github.ref_name }} \
            --set ingress.host=myapp.com
